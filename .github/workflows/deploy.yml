name: Deploy to GitHub Pages

on:
  push:
    branches: ['main'] # ou 'master' selon le nom de ta branche principale

# Autoriser GitHub à modifier les pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installation des dépendances
        run: npm install

      - name: Build du projet React/Vite
        run: npm run build

      - name: Upload des fichiers statiques
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Déploiement sur GitHub Pages
        uses: actions/deploy-pages@v4